# GitHub Actions: cross-compile we-forgectl (Rust) for macOS/Linux/Windows
# and attach binaries to a GitHub Release.
#
# Triggered by tag push matching v*  (e.g. v0.3.0, v1.0.0).
# Manual trigger via workflow_dispatch also supported.
#
# ECC alignment: deployment-patterns + enterprise-agent-ops (release lifecycle)

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed for softprops/action-gh-release

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64-apple-darwin (macos-13 / Intel) intentionally dropped:
          # the macos-13 runner pool is frequently backed up (20-40min+ queue),
          # Intel Macs are a shrinking minority, and aarch64-apple-darwin covers
          # current hardware. Re-add a `- target: x86_64-apple-darwin / os: macos-13`
          # entry here (plus its `files:` line below) if Intel-Mac demand returns.
          - target: aarch64-apple-darwin
            os:     macos-14
            artifact: we-forgectl
          - target: x86_64-unknown-linux-gnu
            os:     ubuntu-22.04
            artifact: we-forgectl
          - target: x86_64-pc-windows-msvc
            os:     windows-2022
            artifact: we-forgectl.exe

    defaults:
      run:
        working-directory: rust

    steps:
      - uses: actions/checkout@v4

      - name: install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ matrix.target }}-${{ hashFiles('rust/Cargo.lock') }}

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }}

      - name: package (unix)
        if: matrix.os != 'windows-2022'
        run: |
          mkdir -p ../dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} \
             ../dist/we-forgectl-${{ matrix.target }}
          (cd ../dist && tar czf we-forgectl-${{ matrix.target }}.tar.gz we-forgectl-${{ matrix.target }})

      - name: package (windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ../dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.artifact }} `
                    ../dist/we-forgectl-${{ matrix.target }}.exe
          Compress-Archive -Path ../dist/we-forgectl-${{ matrix.target }}.exe `
                           -DestinationPath ../dist/we-forgectl-${{ matrix.target }}.zip

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: we-forgectl-${{ matrix.target }}
          path: dist/we-forgectl-${{ matrix.target }}.*

  release:
    name: github release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list artifacts
        run: ls -la dist/

      - name: create release + attach binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/we-forgectl-aarch64-apple-darwin.tar.gz
            dist/we-forgectl-x86_64-unknown-linux-gnu.tar.gz
            dist/we-forgectl-x86_64-pc-windows-msvc.zip
          body: |
            we-forgectl ${{ github.ref_name }}

            ## Install (one-line per OS)

            ### macOS / Linux
            ```bash
            # detect arch + OS, download tarball, install
            ARCH=$(uname -m); OS=$(uname | tr A-Z a-z)
            TRIPLE="${ARCH}-$([ "$OS" = darwin ] && echo apple-darwin || echo unknown-linux-gnu)"
            curl -fsSL https://github.com/EunCHanPark/we-forge/releases/download/${{ github.ref_name }}/we-forgectl-${TRIPLE}.tar.gz | tar xz
            sudo mv we-forgectl-* /usr/local/bin/we-forgectl
            we-forgectl install
            ```

            ### Windows (PowerShell)
            ```powershell
            iwr https://github.com/EunCHanPark/we-forge/releases/download/${{ github.ref_name }}/we-forgectl-x86_64-pc-windows-msvc.zip -OutFile we-forgectl.zip
            Expand-Archive we-forgectl.zip -DestinationPath $env:USERPROFILE\.local\bin
            we-forgectl install
            ```

            See [CHANGELOG.md](CHANGELOG.md) for changes.
